services:
  postgres:
    image: postgres:16
    container_name: study-snap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: study_snap
      POSTGRES_USER: ss_user
      POSTGRES_PASSWORD: ss#20260305
    ports:
      - "5432:5432"
    volumes:
      - study_snap_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ss_user -d study_snap"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: study-snap-backend
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: study_snap
      DB_USER: ss_user
      DB_PASSWORD: ss#20260305
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  study_snap_pgdata:
