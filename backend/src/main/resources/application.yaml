spring:
  application:
    name: study-snap-backend
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:studysnap}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: ${MAX_IMAGE_SIZE:5MB}
      max-request-size: ${MAX_IMAGE_SIZE:5MB}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

logging:
  level:
    root: ${LOG_LEVEL:INFO}

management:
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health

studysnap:
  limits:
    max-notes-chars: ${MAX_NOTES_CHARS_FREE:12000}
    max-image-bytes: ${MAX_IMAGE_BYTES:5000000}
  ocr:
    confidence-threshold: ${OCR_CONFIDENCE_THRESHOLD:0.8}
  llm:
    provider: ${LLM_PROVIDER:openai}
    api-key: ${LLM_API_KEY:}
    base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
    model-free: ${LLM_MODEL_FREE:gpt-4.1-mini}
    model-premium: ${LLM_MODEL_PREMIUM:gpt-4.1}
    quiz-questions-free: ${QUIZ_QUESTIONS_FREE:5}
